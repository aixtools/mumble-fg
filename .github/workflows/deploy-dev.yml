name: Deploy mumble-fg (Dev)

on:
  push:
    branches:
      - main
      - fg-mvp
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deploy target
        env:
          TARGETHOST: ${{ secrets.TARGETHOST }}
          TARGETUSER: ${{ secrets.TARGETUSER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def _parse_target_payload(raw: str, secret_name: str) -> dict:
              try:
                  payload = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{secret_name} must be valid JSON") from exc

              if not isinstance(payload, dict):
                  raise SystemExit(f"Secret {secret_name} must be a JSON object")
              return payload

          host = str(os.environ.get("TARGETHOST", "")).strip()
          raw = os.environ.get("TARGETUSER", "").strip()
          if not host:
              raise SystemExit("TARGETHOST is empty")
          if not raw:
              raise SystemExit("TARGETUSER is empty")

          payload = _parse_target_payload(raw, "TARGETUSER")

          user = str(payload.get("user", "")).strip()
          key = payload.get("key", "")
          home_dir = str(payload.get("home_dir", "")).strip()
          project_dir = str(payload.get("project_dir", "")).strip()
          env_file = str(payload.get("env_file", "")).strip()
          service_units = payload.get("service_units", [])
          port = str(payload.get("port", "22")).strip()
          if not port:
              port = "22"
          cube_project_dir = str(payload.get("cube_project_dir", "")).strip()
          cube_venv = str(payload.get("cube_venv", "")).strip()

          if not user:
              raise SystemExit("TARGETUSER missing required field: user")
          if not isinstance(key, str) or not key.strip():
              raise SystemExit("TARGETUSER missing required field: key")
          if not home_dir:
              home_dir = f"/home/{user}"
          if not project_dir:
              project_dir = f"{home_dir}/mumble-fg"
          if not cube_project_dir:
              if env_file:
                  cube_project_dir = str(Path(env_file).resolve().parent)
              else:
                  cube_project_dir = f"{home_dir}/Cube"
          if not cube_venv:
              cube_venv = f"{cube_project_dir}/venv"
          if service_units is None:
              service_units = []
          if not isinstance(service_units, list):
              raise SystemExit("TARGETUSER field service_units must be a JSON list")
          service_units = [str(unit).strip() for unit in service_units if str(unit).strip()]

          key_path = Path.home() / ".ssh" / "deploy_key"
          key_path.write_text(key.replace("\\n", "\n").rstrip() + "\n", encoding="utf-8")
          key_path.chmod(0o600)

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as fh:
              fh.write(f"DEPLOY_TARGET_HOST={host}\n")
              fh.write(f"DEPLOY_TARGET_USER={user}\n")
              fh.write(f"DEPLOY_TARGET_PORT={port}\n")
              fh.write(f"DEPLOY_HOME_DIR={home_dir}\n")
              fh.write(f"DEPLOY_PROJECT_DIR={project_dir}\n")
              fh.write(f"DEPLOY_ENV_FILE={env_file}\n")
              fh.write(f"DEPLOY_CUBE_PROJECT_DIR={cube_project_dir}\n")
              fh.write(f"DEPLOY_CUBE_VENV={cube_venv}\n")
              fh.write(f"DEPLOY_SERVICE_UNITS_CSV={','.join(service_units)}\n")
          PY

      - name: Set up SSH known hosts
        run: |
          set -euo pipefail
          ssh-keyscan -p "${DEPLOY_TARGET_PORT}" -H "${DEPLOY_TARGET_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy code via rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '.venv/' \
            -e "ssh -p ${DEPLOY_TARGET_PORT} -i ~/.ssh/deploy_key" \
            ./ "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}:${DEPLOY_PROJECT_DIR%/}/"

      - name: Install mumble-fg in Cube venv and run Django maintenance
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_PROJECT_DIR='${DEPLOY_PROJECT_DIR}' DEPLOY_CUBE_PROJECT_DIR='${DEPLOY_CUBE_PROJECT_DIR}' DEPLOY_CUBE_VENV='${DEPLOY_CUBE_VENV}' bash -s" <<'EOF'
          set -euo pipefail

          if [ ! -d "${DEPLOY_CUBE_VENV}" ]; then
            echo "[deploy] Cube venv not found at ${DEPLOY_CUBE_VENV}" >&2
            exit 1
          fi
          if [ ! -f "${DEPLOY_CUBE_PROJECT_DIR}/manage.py" ]; then
            echo "[deploy] Cube manage.py not found at ${DEPLOY_CUBE_PROJECT_DIR}" >&2
            exit 1
          fi

          # Remove stale editable-install .pyc files that may be owned by another user
          find "${DEPLOY_CUBE_VENV}/lib" -path '*/__pycache__/__editable___mumble_fg*' -delete 2>/dev/null || true

          echo "[deploy] Installing mumble-fg into Cube venv from ${DEPLOY_PROJECT_DIR}"
          "${DEPLOY_CUBE_VENV}/bin/pip" install --quiet --no-deps -e "${DEPLOY_PROJECT_DIR}"

          cd "${DEPLOY_CUBE_PROJECT_DIR}"
          echo "[deploy] Running Django migrate mumble_fg"
          "${DEPLOY_CUBE_VENV}/bin/python" manage.py migrate mumble_fg --noinput
          echo "[deploy] Running collectstatic"
          "${DEPLOY_CUBE_VENV}/bin/python" manage.py collectstatic --noinput
          EOF

      - name: Sync BG_PSK into FG env (optional)
        env:
          BG_PSK_SECRET: ${{ secrets.BG_PSK }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "No env_file configured in deploy target; skipping BG_PSK sync."
            exit 0
          fi
          if [ -z "${BG_PSK_SECRET:-}" ]; then
            echo "BG_PSK secret is empty." >&2
            exit 1
          fi

          BG_PSK_SECRET_B64="$(printf '%s' "${BG_PSK_SECRET}" | base64 | tr -d '\n')"
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' BG_PSK_SECRET_B64='${BG_PSK_SECRET_B64}' bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "$(dirname "${DEPLOY_ENV_FILE}")"

          BG_PSK="$(printf '%s' "${BG_PSK_SECRET_B64}" | base64 -d)"
          export BG_PSK

          python3 - <<'PY'
          import os
          import shlex
          from pathlib import Path

          env_path = Path(os.environ["DEPLOY_ENV_FILE"])
          line = f"BG_PSK={shlex.quote(os.environ['BG_PSK'])}"

          if env_path.exists():
              lines = env_path.read_text(encoding="utf-8").splitlines()
          else:
              lines = []

          filtered = []
          replaced = False
          for existing in lines:
              if existing.startswith("BG_PSK=") or existing.startswith("FGBG_PSK=") or existing.startswith("MURMUR_CONTROL_PSK="):
                  if not replaced:
                      filtered.append(line)
                      replaced = True
                  continue
              filtered.append(existing)

          if not replaced:
              if filtered and filtered[-1] != "":
                  filtered.append("")
              filtered.append("# Synced by mumble-fg deploy workflow")
              filtered.append(line)

          env_path.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          env_path.chmod(0o600)
          PY
          EOF

      - name: Restart host services (best effort)
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SERVICE_UNITS_CSV:-}" ]; then
            echo "No service_units configured in deploy target; skipping restarts."
            exit 0
          fi

          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_SERVICE_UNITS_CSV='${DEPLOY_SERVICE_UNITS_CSV}' bash -s" <<'EOF'
          set -euo pipefail

          restart_if_present() {
            local unit="$1"
            if systemctl list-unit-files "${unit}" >/dev/null 2>&1; then
              echo "Restarting ${unit}"
              if sudo -n systemctl restart "${unit}"; then
                echo "Restarted ${unit}"
              else
                echo "Passwordless sudo not allowed for restart ${unit}; skipping."
              fi
            else
              echo "Unit not present: ${unit}"
            fi
          }

          IFS=',' read -r -a service_units <<< "${DEPLOY_SERVICE_UNITS_CSV}"
          for service_unit in "${service_units[@]}"; do
            restart_if_present "${service_unit}"
          done
          EOF

      - name: Deploy path sanity check
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "test -f ${DEPLOY_PROJECT_DIR%/}/fg/views.py && test -f ${DEPLOY_PROJECT_DIR%/}/templates/fg/panels/profile_panel.html && test -f ${DEPLOY_CUBE_PROJECT_DIR%/}/manage.py"
