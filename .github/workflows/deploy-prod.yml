name: Deploy mumble-fg (Prod)

on:
  workflow_dispatch:
    inputs:
      deploy_target_name:
        description: 'Secret name containing deploy target JSON'
        required: false
        default: 'CUBE_PROD_CUBE'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET_NAME: ${{ github.event.inputs.deploy_target_name || 'CUBE_PROD_CUBE' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deploy target
        env:
          DEPLOY_TARGET_JSON: ${{ secrets[github.event.inputs.deploy_target_name || 'CUBE_PROD_CUBE'] }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          python3 - <<'PY'
          import json
          import os
          from json import JSONDecodeError
          from pathlib import Path

          def _parse_target_payload(raw: str, target_name: str) -> dict:
              try:
                  payload = json.loads(raw)
              except JSONDecodeError:
                  # Common operator input mistake: literal newlines in "key" JSON string.
                  key_field = '"key"'
                  key_index = raw.find(key_field)
                  if key_index < 0:
                      raise
                  colon_index = raw.find(':', key_index + len(key_field))
                  if colon_index < 0:
                      raise
                  quote_start = raw.find('"', colon_index + 1)
                  if quote_start < 0:
                      raise

                  i = quote_start + 1
                  while i < len(raw):
                      if raw[i] == '"' and raw[i - 1] != '\\':
                          break
                      i += 1
                  if i >= len(raw):
                      raise

                  key_raw = raw[quote_start + 1:i]
                  key_escaped = (
                      key_raw
                      .replace('\\', '\\\\')
                      .replace('\r', '\\r')
                      .replace('\n', '\\n')
                      .replace('\t', '\\t')
                  )
                  repaired = raw[:quote_start + 1] + key_escaped + raw[i:]
                  payload = json.loads(repaired)

              if not isinstance(payload, dict):
                  raise SystemExit(f"Secret {target_name} must be a JSON object")
              return payload

          target_name = os.environ.get("DEPLOY_TARGET_NAME", "").strip()
          raw = os.environ.get("DEPLOY_TARGET_JSON", "").strip()
          if not target_name:
              raise SystemExit("DEPLOY_TARGET_NAME is empty")
          if not raw:
              raise SystemExit(
                  f"Missing deploy target secret payload for {target_name}. "
                  f"Create a secret named {target_name} with JSON fields host/user/key."
              )

          payload = _parse_target_payload(raw, target_name)

          host = str(payload.get("host", "")).strip()
          user = str(payload.get("user", "")).strip()
          key = payload.get("key", "")
          home_dir = str(payload.get("home_dir", "")).strip()
          project_dir = str(payload.get("project_dir", "")).strip()
          env_file = str(payload.get("env_file", "")).strip()
          service_units = payload.get("service_units", [])
          port = str(payload.get("port", "22")).strip()
          if not port:
              port = "22"
          cube_venv = str(payload.get("cube_venv", "")).strip()

          if not host:
              raise SystemExit(f"Secret {target_name} missing required field: host")
          if not user:
              raise SystemExit(f"Secret {target_name} missing required field: user")
          if not isinstance(key, str) or not key.strip():
              raise SystemExit(f"Secret {target_name} missing required field: key")
          if not home_dir:
              home_dir = f"/home/{user}"
          if not project_dir:
              project_dir = f"{home_dir}/mumble-fg"
          if service_units is None:
              service_units = []
          if not isinstance(service_units, list):
              raise SystemExit(f"Secret {target_name} field service_units must be a JSON list")
          service_units = [str(unit).strip() for unit in service_units if str(unit).strip()]
          if not cube_venv:
              cube_venv = f"{home_dir}/Cube/venv"

          key_path = Path.home() / ".ssh" / "deploy_key"
          key_path.write_text(key.replace("\\n", "\n").rstrip() + "\n", encoding="utf-8")
          key_path.chmod(0o600)

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as fh:
              fh.write(f"DEPLOY_TARGET_HOST={host}\n")
              fh.write(f"DEPLOY_TARGET_USER={user}\n")
              fh.write(f"DEPLOY_TARGET_PORT={port}\n")
              fh.write(f"DEPLOY_HOME_DIR={home_dir}\n")
              fh.write(f"DEPLOY_PROJECT_DIR={project_dir}\n")
              fh.write(f"DEPLOY_ENV_FILE={env_file}\n")
              fh.write(f"DEPLOY_SERVICE_UNITS_CSV={','.join(service_units)}\n")
              fh.write(f"DEPLOY_CUBE_VENV={cube_venv}\n")
          PY

      - name: Set up SSH known hosts
        run: |
          set -euo pipefail
          ssh-keyscan -p "${DEPLOY_TARGET_PORT}" -H "${DEPLOY_TARGET_HOST}" >> ~/.ssh/known_hosts

      - name: Preflight /etc/mumble-fg/keys (fail fast)
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_TARGET_USER='${DEPLOY_TARGET_USER}' bash -s" <<'EOF'
          set -euo pipefail
          if [ ! -d /etc/mumble-fg/keys ]; then
            sudo mkdir -p /etc/mumble-fg/keys
            sudo chmod 0755 /etc/mumble-fg
            sudo chmod 0700 /etc/mumble-fg/keys
            sudo chown -R "${DEPLOY_TARGET_USER}:${DEPLOY_TARGET_USER}" /etc/mumble-fg
          else
            echo "[preflight] /etc/mumble-fg/keys exists; skipping sudo."
          fi
          EOF

      - name: Deploy code via rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '.venv/' \
            --exclude '*.egg-info/' \
            -e "ssh -p ${DEPLOY_TARGET_PORT} -i ~/.ssh/deploy_key" \
            ./ "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}:${DEPLOY_PROJECT_DIR%/}/"

      - name: Bootstrap mumble-fg in Cube venv
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_PROJECT_DIR='${DEPLOY_PROJECT_DIR}' DEPLOY_CUBE_VENV='${DEPLOY_CUBE_VENV}' bash -s" <<'EOF'
          set -euo pipefail

          if [ ! -d "${DEPLOY_CUBE_VENV}" ]; then
            echo "[bootstrap] Cube venv not found at ${DEPLOY_CUBE_VENV}; skipping pip install."
            exit 0
          fi

          if "${DEPLOY_CUBE_VENV}/bin/python" -m pip show mumble-fg >/dev/null 2>&1; then
            echo "[bootstrap] mumble-fg already installed in Cube venv; skipping."
            exit 0
          fi

          # Remove stale editable-install .pyc files that may be owned by another user
          find "${DEPLOY_CUBE_VENV}/lib" -path '*/__pycache__/__editable___mumble_fg*' -delete 2>/dev/null || true

          echo "[bootstrap] Installing mumble-fg into Cube venv."
          "${DEPLOY_CUBE_VENV}/bin/pip" install --quiet -e "${DEPLOY_PROJECT_DIR}"
          echo "[bootstrap] mumble-fg installed."
          EOF

      - name: Run migrations
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_CUBE_VENV='${DEPLOY_CUBE_VENV}' bash -s" <<'EOF'
          set -euo pipefail
          CUBE_DIR="$(dirname "${DEPLOY_CUBE_VENV}")"

          if [ ! -f "${CUBE_DIR}/manage.py" ]; then
            echo "[migrate] manage.py not found at ${CUBE_DIR}; skipping migrations."
            exit 0
          fi

          cd "${CUBE_DIR}"
          source "${DEPLOY_CUBE_VENV}/bin/activate"
          python manage.py migrate mumble_fg --noinput
          EOF

      - name: Sync FG_PKI_PASSPHRASE into FG env (optional)
        env:
          FG_PKI_PASSPHRASE_SECRET: ${{ secrets.FG_PKI_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "No env_file configured in deploy target; skipping FG_PKI_PASSPHRASE sync."
            exit 0
          fi
          if [ -z "${FG_PKI_PASSPHRASE_SECRET:-}" ]; then
            echo "FG_PKI_PASSPHRASE secret is empty." >&2
            exit 1
          fi

          FG_PKI_PASSPHRASE_SECRET_B64="$(printf '%s' "${FG_PKI_PASSPHRASE_SECRET}" | base64 | tr -d '\n')"
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' FG_PKI_PASSPHRASE_SECRET_B64='${FG_PKI_PASSPHRASE_SECRET_B64}' bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "$(dirname "${DEPLOY_ENV_FILE}")"

          FG_PKI_PASSPHRASE="$(printf '%s' "${FG_PKI_PASSPHRASE_SECRET_B64}" | base64 -d)"
          export FG_PKI_PASSPHRASE

          python3 - <<'PY'
          import os
          import shlex
          from pathlib import Path

          env_path = Path(os.environ["DEPLOY_ENV_FILE"])
          line = f"FG_PKI_PASSPHRASE={shlex.quote(os.environ['FG_PKI_PASSPHRASE'])}"

          if env_path.exists():
              lines = env_path.read_text(encoding="utf-8").splitlines()
          else:
              lines = []

          filtered = []
          replaced = False
          for existing in lines:
              if existing.startswith("FG_PKI_PASSPHRASE="):
                  if not replaced:
                      filtered.append(line)
                      replaced = True
                  continue
              filtered.append(existing)

          if not replaced:
              if filtered and filtered[-1] != "":
                  filtered.append("")
              filtered.append("# Synced by mumble-fg deploy workflow")
              filtered.append(line)

          env_path.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          env_path.chmod(0o600)
          PY
          EOF

      - name: Ensure FG keypair exists (optional)
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "No env_file configured in deploy target; skipping keypair ensure."
            exit 0
          fi

          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_CUBE_VENV='${DEPLOY_CUBE_VENV}' DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' bash -s" <<'EOF'
          set -euo pipefail

          if [ -f /etc/mumble-fg/keys/private_key.pem ] && [ -f /etc/mumble-fg/keys/public_key.pem ]; then
            echo "[keys] Keypair already exists; skipping ensure."
            exit 0
          fi

          CUBE_DIR="$(dirname "${DEPLOY_CUBE_VENV}")"
          if [ ! -f "${CUBE_DIR}/manage.py" ]; then
            echo "[keys] manage.py not found at ${CUBE_DIR}" >&2
            exit 1
          fi

          if [ -f "${DEPLOY_ENV_FILE}" ]; then
            set -a
            # shellcheck disable=SC1090
            source "${DEPLOY_ENV_FILE}"
            set +a
          fi

          cd "${CUBE_DIR}"
          source "${DEPLOY_CUBE_VENV}/bin/activate"
          echo "[keys] Generating/normalizing FG keypair under /etc/mumble-fg/keys"
          python manage.py ensure_fg_keypair --key-dir /etc/mumble-fg/keys
          EOF

      - name: Restart host services (best effort)
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SERVICE_UNITS_CSV:-}" ]; then
            echo "No service_units configured in deploy target; skipping restarts."
            exit 0
          fi

          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_SERVICE_UNITS_CSV='${DEPLOY_SERVICE_UNITS_CSV}' bash -s" <<'EOF'
          set -euo pipefail

          restart_if_present() {
            local unit="$1"
            if systemctl list-unit-files "${unit}" >/dev/null 2>&1; then
              echo "Restarting ${unit}"
              if sudo -n systemctl restart "${unit}"; then
                echo "Restarted ${unit}"
              else
                echo "Passwordless sudo not allowed for restart ${unit}; skipping."
              fi
            else
              echo "Unit not present: ${unit}"
            fi
          }

          IFS=',' read -r -a service_units <<< "${DEPLOY_SERVICE_UNITS_CSV}"
          for service_unit in "${service_units[@]}"; do
            restart_if_present "${service_unit}"
          done
          EOF

      - name: Deploy path sanity check
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "test -f ${DEPLOY_PROJECT_DIR%/}/fg/views.py && test -f ${DEPLOY_PROJECT_DIR%/}/templates/fg/panels/profile_panel.html"
